name: Daily Prices RO + EU

on:
  # 17:00 UTC = 19:00 România (EET) de luni până vineri
  schedule:
    - cron: "0 17 * * 1-5"
  workflow_dispatch:

jobs:
  daily-prices-ro-eu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch RO + EU prices
        run: |
          export PYTHONPATH=$PYTHONPATH:${{ github.workspace }}
          python stockd/run_daily.py --regions RO,EU

      - name: Commit updated prices_history.csv
        run: |
          git config --global user.name "StockD Agent"
          git config --global user.email "agent@stockd.ai"

          git add data/prices_history.csv || true
          git commit -m "Daily RO+EU price update" || echo "No changes to commit"
          git push
