name: Daily EU prices (Yahoo)

on:
  schedule:
    # Rulează tot la 17:00 UTC (≈ 19:00 România) în zilele lucrătoare
    - cron: "0 17 * * 1-5"
  workflow_dispatch:

jobs:
  fetch-eu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=$PYTHONPATH:${{ github.workspace }}" >> $GITHUB_ENV

      - name: Fetch EU prices
        run: |
          python stockd/run_daily.py --regions EU

      - name: Commit updated prices_history.csv
      - uses: stefanzweifel/git-auto-commit-action@v5
  with:
    commit_message: "Updated prices_history.csv"
    commit_user_name: "StockD Agent"
    commit_user_email: "stockd@bot.com"
    pull_strategy: "pull"         # <<< magie: face git pull înainte de push
