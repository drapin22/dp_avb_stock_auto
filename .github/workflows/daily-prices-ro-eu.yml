name: Daily Prices RO/EU

on:
  schedule:
    - cron: "10 18 * * 1-5"  # 18:10 UTC = 19:10 CET
  workflow_dispatch:

jobs:
  fetch-ro-eu:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch RO + EU prices
        run: python stockd/run_daily.py --regions RO,EU

      - name: Commit changes
        run: |
          git config user.name "StockD Agent"
          git config user.email "agent@users.noreply.github.com"
          git add data/prices_history.csv
          git commit -m "Daily RO/EU price update" || echo "No changes"
          git push
