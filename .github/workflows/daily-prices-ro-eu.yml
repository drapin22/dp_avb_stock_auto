name: Daily RO+EU Prices

on:
  schedule:
    # 17:05 UTC ≈ 19:05 în România (EET) Luni–Vineri
    - cron: "5 17 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-prices
  cancel-in-progress: false

jobs:
  fetch-ro-eu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch RO + EU prices
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          python stockd/run_daily.py --regions RO,EU

      - name: Commit updated prices_history.csv
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily prices update (RO + EU)"
          commit_user_name: "StockD Agent"
          commit_user_email: "stockd@bot.com"
          file_pattern: data/prices_history.csv
          pull_strategy: "pull"
