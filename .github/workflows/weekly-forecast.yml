name: Weekly Forecast (Sunday 10:00)

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run learning loop (eval + calibration)
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          python -m stockd.learning

      - name: Run weekly StockD forecast (writes Adj_ER_Pct too)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          python stockd/model_weekly.py

      - name: Commit forecast + learning state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Weekly forecast + learning state"
          file_pattern: |
            data/forecasts_stockd.csv
            data/model_eval_detailed.csv
            data/model_eval_summary.csv
            data/calibration.json
          commit_user_name: "StockD Agent"
          commit_user_email: "stockd@bot.com"
