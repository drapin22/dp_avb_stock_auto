name: Weekly Forecast (StockD)

on:
  schedule:
    # duminica la 18:00 UTC (ajustezi cum vrei)
    - cron: "0 18 * * 0"
  workflow_dispatch:

jobs:
  weekly-forecast:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run weekly StockD model (next week benchmark)
        run: |
          python -m stockd.model_weekly
