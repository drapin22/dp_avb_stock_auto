name: Weekly Forecast (StockD)

on:
  # poți porni manual din tab-ul Actions
  workflow_dispatch:
  # și automat, săptămânal (exemplu: duminică 18:00 UTC)
  schedule:
    - cron: "0 18 * * 0"

jobs:
  weekly-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run weekly StockD model (next week benchmark)
        run: |
          python -m stockd.model_weekly

      - name: Commit forecasts_stockd.csv
        run: |
          git config --global user.name "StockD Agent"
          git config --global user.email "agent@github.com"
          git add data/forecasts_stockd.csv || echo "No forecasts file to add."
          git status
          git commit -m "Weekly forecast update" || echo "Nothing to commit"
          git push
