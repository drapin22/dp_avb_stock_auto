name: Weekly Forecast (Sunday 10:00)

on:
  schedule:
    - cron: "0 8 * * 0"   # 08:00 UTC = 10:00 România
  workflow_dispatch:

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly StockD forecast
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          python stockd/model_weekly.py

      - name: Commit forecast file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Weekly forecast generated"
          file_pattern: data/forecasts_stockd.csv
          commit_user_name: "StockD Agent"

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TEXT="Weekly forecast generated successfully."
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$TEXT"
