name: Weekly Forecast (Sunday 10:00)

on:
  schedule:
    # Duminică 10:00 UTC
    - cron: "0 10 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly forecast (StockD)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m stockd.model_weekly

      - name: Commit weekly forecast outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Weekly forecast + learning outputs"
          file_pattern: |
            data/forecasts_stockd.csv
            reports/weekly_forecast_*.csv
          commit_user_name: "StockD Agent"
          commit_user_email: "stockd@bot.com"
          commit_author: "${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
