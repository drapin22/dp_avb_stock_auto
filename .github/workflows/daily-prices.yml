name: Daily RO prices (BVB)

on:
  schedule:
    # Rulează la 17:00 UTC (≈ 19:00 România iarna) în zilele lucrătoare
    - cron: "0 17 * * 1-5"
  workflow_dispatch:

jobs:
  fetch-ro:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=$PYTHONPATH:${{ github.workspace }}" >> $GITHUB_ENV

      - name: Run BVB agent (RO)
        run: |
          python agents/bvb_agent.py

      - name: Commit updated prices_history.csv
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily RO price update"
          file_pattern: "data/prices_history.csv"
