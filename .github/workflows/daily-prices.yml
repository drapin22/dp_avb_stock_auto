name: Daily Prices (All Regions, manual)

on:
  workflow_dispatch:

concurrency:
  group: daily-prices
  cancel-in-progress: false

jobs:
  fetch-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch RO + EU + US prices
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          python stockd/run_daily.py --regions RO,EU,US

      - name: Commit updated prices_history.csv
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily prices update (RO + EU + US)"
          commit_user_name: "StockD Agent"
          commit_user_email: "stockd@bot.com"
          file_pattern: data/prices_history.csv
          pull_strategy: "pull"
