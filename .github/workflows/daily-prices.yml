name: Daily Prices Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "15 20 * * 1-5"  # Luni-Vineri, 20:15 UTC

jobs:
  fetch-bvb-and-global:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run BVB agent (RO)
        run: python agents/bvb_agent.py

      - name: Run Yahoo agent (EU + US)
        run: python agents/yahoo_agent.py

      - name: Commit updated prices_history.csv
        run: |
          git config --global user.name "StockD Agent"
          git config --global user.email "agent@stockd.local"
          git add data/prices_history.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily price update"
            git push
          fi
