name: Daily Prices Sync

on:
  schedule:
    # Luni–vineri, după închiderea BVB (ajustezi ora la fusul tău)
    - cron: '30 15 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-bvb-and-global:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily sync (RO + EU + US)
        run: python -m stockd.run_daily

      - name: Commit updated prices_history.csv
        run: |
          git config --global user.name "StockD Agent"
          git config --global user.email "agent@example.com"
          git add data/prices_history.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily price update"
            git push
          fi
