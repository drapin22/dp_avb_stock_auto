name: Daily Prices (All Regions, manual)

on:
  workflow_dispatch:

concurrency:
  group: daily-prices-all
  cancel-in-progress: false

jobs:
  fetch-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch RO from BVB
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          python agents/bvb_agent.py

      - name: Fetch EU + US from Yahoo
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          python stockd/run_daily.py --regions EU,US

      - name: Commit updated prices_history.csv
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily prices update (RO + EU + US)"
          file_pattern: data/prices_history.csv
          commit_user_name: "StockD Agent"
          commit_user_email: "stockd@bot.com"
          commit_author: "drapin22 <246702585+drapin22@users.noreply.github.com>"
          skip_fetch: true
          push_options: "--force-with-lease"
