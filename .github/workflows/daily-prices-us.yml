name: Daily US prices (Yahoo)

on:
  schedule:
    # Exemplu: 22:30 UTC în zilele lucrătoare (≈ în jurul închiderii pieței US)
    # Ajustează dacă vrei altă oră.
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

jobs:
  fetch-us:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=$PYTHONPATH:${{ github.workspace }}" >> $GITHUB_ENV

      - name: Fetch US prices
        run: |
          python stockd/run_daily.py --regions US

      - name: Commit updated prices_history.csv
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily US price update"
          file_pattern: "data/prices_history.csv"
