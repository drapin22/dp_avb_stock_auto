name: Daily EU + US Prices (Yahoo)

on:
  schedule:
    # 21:05 UTC ≈ 23:05 România (EET), Luni–Vineri
    - cron: "5 21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-prices-global
  cancel-in-progress: false

jobs:
  fetch-eu-us:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch EU + US prices from Yahoo
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          python stockd/run_daily.py --regions EU,US

      - name: Commit updated prices_history.csv
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily prices update (EU + US, Yahoo)"
          file_pattern: data/prices_history.csv
          commit_user_name: "StockD Agent"
          commit_user_email: "stockd@bot.com"
          commit_author: "drapin22 <246702585+drapin22@users.noreply.github.com>"
          skip_fetch: true
          push_options: "--force-with-lease"
