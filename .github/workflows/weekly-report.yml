name: Weekly Report (Model vs Real)

on:
  schedule:
    # Sâmbăta la 09:00 UTC ≈ 10:00 GMT+1
    - cron: "0 9 * * 6"
  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly BVB model vs real report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m stockd.weekly_report

      - name: Commit weekly report Excel
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Weekly BVB model vs real report"
          file_pattern: "reports/weekly_bvb_model_vs_real_*.xlsx"
          commit_user_name: "StockD Agent"
          commit_user_email: "stockd@bot.com"
          commit_author: "${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
