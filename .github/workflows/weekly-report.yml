name: Weekly Report + Learning

on:
  schedule:
    - cron: "0 9 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-main-writer
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with origin/main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git clean -fd

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade "openai>=1.55.0"

      - name: Weekly report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m stockd.weekly_report || true

      - name: Learning (fit + mentor)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STOCKD_ENABLE_MENTOR: "1"
          STOCKD_ENABLE_LLM_NEWS_ADJ: "1"
          STOCKD_ENABLE_MACRO: "1"
        run: |
          python -m stockd.learning

      - name: Commit artifacts
        run: |
          git config user.name "StockD Agent"
          git config user.email "stockd@bot.com"

          git add \
            data/model_state.json \
            data/mentor_overrides.json \
            data/forecasts_stockd.csv \
            reports/weekly_forecast_*.csv \
            reports/weekly_bvb_model_vs_real_*.xlsx \
            reports/*.png || true

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Weekly learning artifacts"
          git pull --rebase origin main
          git push origin HEAD:main
