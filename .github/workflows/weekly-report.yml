name: Weekly Report (Model vs Real)

on:
  schedule:
    - cron: "0 9 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-report
  cancel-in-progress: false

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run learning loop (eval + calibration)
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          python -m stockd.learning

      - name: Run weekly report (Telegram + Excel + chart)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          python -m stockd.weekly_report

      - name: Commit weekly outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Weekly report + learning outputs"
          file_pattern: |
            reports/weekly_bvb_model_vs_real_*.xlsx
            reports/weekly_bvb_model_vs_real_*.png
            data/model_eval_detailed.csv
            data/model_eval_summary.csv
            data/calibration.json
          commit_user_name: "StockD Agent"
          commit_user_email: "stockd@bot.com"
