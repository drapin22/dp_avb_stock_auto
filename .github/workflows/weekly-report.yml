name: Weekly Report (Model vs Real)

on:
  schedule:
    # 09:00 UTC ~ 10:00 în Olanda iarna
    - cron: "0 9 * * 6"
  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly report and send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m stockd.weekly_report

      - name: Commit weekly report artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Weekly report (model vs real)"
          file_pattern: |
            data/weekly_report/*.csv
            data/weekly_report/*.xlsx
            data/weekly_report/*.png
          commit_user_name: StockD Agent
          commit_user_email: stockd@bot.com
