name: Weekly Report (Model vs Real)

on:
  schedule:
    - cron: "0 9 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-main-writer
  cancel-in-progress: false

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync working copy with origin/main (avoid diverged history)
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git clean -fd

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade "openai>=1.55.0"

      - name: Run weekly report (Excel + chart + Telegram)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m stockd.weekly_report

      - name: Run learning (eval + scoring + mentor)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m stockd.learning

      - name: Commit and push artifacts (rebase-safe)
        run: |
          git config user.name "StockD Agent"
          git config user.email "stockd@bot.com"

          git add \
            reports/weekly_bvb_model_vs_real_*.xlsx \
            reports/weekly_chart_*.png \
            reports/model_eval_detailed.csv \
            reports/model_eval_summary.csv \
            reports/weekly_forecast_*.csv \
            reports/calibration.json \
            reports/scores_stockd.csv \
            reports/mentor_overrides.json \
            data/calibration.json \
            data/scores_stockd.csv \
            data/mentor_overrides.json \
            data/forecasts_stockd.csv || true

          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi

          git commit -m "Weekly report + learning artifacts"

          git pull --rebase origin main
          git push origin HEAD:main
