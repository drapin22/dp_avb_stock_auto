name: Weekly Report (Model vs Real)

on:
  schedule:
    # Saturday 09:00 UTC
    - cron: "0 9 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-main-writer
  cancel-in-progress: false

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync working copy with origin/main (avoid diverged history)
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git clean -fd

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade "openai>=1.55.0"

      - name: Run weekly report (Excel + charts + Telegram)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          python -m stockd.weekly_report

      - name: Run learning (eval + scoring + mentor)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)"
          python -m stockd.learning

      - name: Commit and push artifacts (rebase-safe + fallback)
        run: |
          set -e

          git config user.name "StockD Agent"
          git config user.email "stockd@bot.com"

          echo "DEBUG: repo status before add"
          git status --porcelain || true

          echo "DEBUG: listing possible artifact locations"
          echo "---- data/ ----"
          ls -la data || true
          echo "---- reports/ ----"
          ls -la reports || true
          echo "---- stockd/data/ ----"
          ls -la stockd/data || true

          # Add artifacts with fallback paths
          git add \
            reports/weekly_bvb_model_vs_real_*.xlsx \
            reports/weekly_forecast_*.csv \
            reports/model_eval_detailed.csv \
            reports/model_eval_summary.csv \
            reports/mentor_postmortem_*.md \
            reports/mentor_raw_*.txt \
            data/calibration.json \
            data/scores_stockd.csv \
            data/mentor_overrides.json \
            stockd/data/calibration.json \
            stockd/data/scores_stockd.csv \
            stockd/data/mentor_overrides.json || true

          echo "DEBUG: staged changes"
          git diff --cached --name-only || true

          # No changes? exit cleanly
          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi

          git commit -m "Weekly report + learning artifacts"

          # Integrate any new remote commits safely
          git fetch origin main
          git pull --rebase origin main

          # Push
          git push origin HEAD:main
