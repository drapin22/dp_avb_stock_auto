name: Weekly Report (Model vs Real)

on:
  schedule:
    # Sâmbăta la 09:00 UTC ≈ 10:00 CET/CEST
    - cron: "0 9 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade "openai>=1.55.0"

      - name: Run weekly report (Excel + charts + Telegram)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m stockd.weekly_report

      - name: Run learning (eval + scoring + mentor overrides)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m stockd.learning

      - name: Pull latest main (rebase)
        run: |
          git config user.name "StockD Agent"
          git config user.email "stockd@bot.com"
          git pull --rebase origin main

      - name: Commit weekly report + learning artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Weekly report + learning artifacts"
          file_pattern: |
            reports/weekly_bvb_model_vs_real_*.xlsx
            reports/model_eval_detailed.csv
            reports/model_eval_summary.csv
            reports/mentor_postmortem_*.md
            data/calibration.json
            data/scores_stockd.csv
            data/mentor_overrides.json
          commit_user_name: "StockD Agent"
          commit_user_email: "stockd@bot.com"
          commit_author: "${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>"
